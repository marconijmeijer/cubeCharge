<style>
  .loading-view {
    min-height: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    text-align: center;
  }

  .loading-spinner {
    width: 44px;
    height: 44px;
    border: 4px solid rgba(0, 0, 0, 0.12);
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-title {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: #111;
  }

  .loading-subtitle {
    margin: 0;
    font-size: 14px;
    color: #666;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
</style>

<main class="loading-view">
  <div class="loading-spinner" aria-hidden="true"></div>
  <h1 class="loading-title">Loading charge boxes</h1>
  <p class="loading-subtitle">Waiting for CubeCharging to return your charge boxes...</p>
  <p class="loading-subtitle">(This may take a while...)</p>
</main>

<script type="application/javascript">
  Homey.setTitle('CubeCharging');

  async function loadChargeBoxes() {
    try {
      await Homey.emit('load_devices');
      await Homey.showView('list_devices');
    } catch (error) {
      await Homey.alert(error && error.message ? error.message : String(error), 'error');
      await Homey.showView('api_key');
    }
  }

  setTimeout(loadChargeBoxes, 100);
</script>
